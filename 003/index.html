<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="assets/twbs-icons-dd5f3c4/font/bootstrap-icons.css"
    />
    <title>client</title>
  </head>
  <body>
    <div class="container-fluid p-0">
      <div class="row g-0">
        <div
          class="sidebar-container col-lg-3 d-none d-lg-block position-sticky end-0 top-0 vh-100 pt-3 pb-3 ps-4 pe-4"
        >
          <div class="sidebar">
            <div class="sidebar-logo">
              <a href="#" class="">
                <img src="assets/images/logo.png" class="img-fluid" alt="" />
              </a>
            </div>
            <div class="sidebar-search">
              <form
                method="GET"
                action="https://www.taminfalat.com/search"
                role="form"
                data-parsley-validate=""
                novalidate=""
              >
                <input
                  type="text"
                  name="main_search"
                  id="main_search1"
                  autocomplete="off"
                  placeholder="جستجو..."
                  class="text-search"
                  value=""
                  data-parsley-id="4"
                />
              </form>
              <i class="bi bi-search"></i>
            </div>
            <div class="sidebar-banner"></div>
            <div class="sidebar-user d-flex justify-content-center">
              <a href="#" title="پروفایل ">
                <i
                  class="bi bi-person-circle"
                  title="ورود به داشبورد مشتری"
                ></i>
                <span>ورود / ثبت نام</span>
              </a>
            </div>
            <div class="sidebar-cart">
              <a href="#" title="سبد خرید">
                <i class="bi bi-cart3"></i>
                <span class="basket-count">0</span>
              </a>
            </div>
            <div
              class="sidebar-support d-flex justify-content-center align-items-center"
            >
              <a href="tel:02191001214" class="d-flex align-items-center">
                <img
                  src="assets/images/support.png"
                  width="30"
                  height="30"
                  alt=""
                />
                <p class="m-0" style="font-size: 14px">پشتیبانی</p>
              </a>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <header class="sticky-top d-none d-lg-block">
            <a class="" href="#" target="_blank" id="festival-banner">
              <div class="" style="padding-top: 3.125%; min-height: 40px">
                <div class="position-absolute" style="inset: 0">
                  <img
                    loading="eager"
                    src="assets/images/ad-banner.gif"
                    width="1920"
                    height="40"
                    alt="festival-banner"
                    class="w-100 h-100 object-fit-cover"
                  />
                </div>
              </div>
            </a>
          </header>
          <main>
            <div class="d-flex justify-content-center mt-5">
              <div class="text-center">
                <div class="mb-2">
                  <img src="assets/images/users.png" width="120" alt="" />
                </div>
                <div class="mb-4">
                  <p style="font-size: 18px; font-weight: 600; color: #7c9307">
                    ورود به حساب کاربری مشتری
                  </p>
                  <span
                    style="font-size: 16px; font-weight: 600; color: #7c9307"
                  >
                    خوش اومدی :)
                  </span>
                </div>
                <form class="login-form mb-4" method="POST" action="/api/login">
                  <div class="input-wrapper">
                    <input type="text" name="mobile" placeholder=" " required />
                    <label>موبایل</label>
                  </div>
                  <div class="input-wrapper">
                    <input
                      type="password"
                      name="password"
                      placeholder=" "
                      required
                    />
                    <label>رمز عبور</label>
                  </div>
                  <div
                    class="mt-4"
                    style="display: flex; justify-content: center"
                  >
                    <input
                      type="submit"
                      value="ورود"
                      style="
                        padding: 5px 40px;
                        font-weight: bold;
                        font-size: 20px;
                        border: 2px solid #a8cf45;
                        color: #7c9307;
                        outline: none;
                        border-radius: 14px;
                        background: none;
                      "
                    />
                  </div>
                </form>
                <div>
                  <a href="#" style="color: #7c9307; text-decoration: none"
                    >رمز عبور خود را فراموش کرده اید؟</a
                  >
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>

    <header
      class="d-lg-none position-fixed top-0 start-0 end-0"
      style="z-index: 1030"
    >
      <div id="festival-banner-wrapper">
        <a href="#" target="_blank" id="festival-banner">
          <div>
            <img
              loading="eager"
              src="assets/images/ad-banner.gif"
              width="1920"
              height="40"
              alt="festival-banner"
              class="w-100 d-block object-fit-cover"
            />
          </div>
        </a>
      </div>
      <div class="topbar border-bottom">
        <div class="d-flex justify-content-between align-items-center">
          <div class="topbar-logo">
            <a href="#">
              <img src="assets/images/logo.png" alt="logo" />
            </a>
          </div>
          <div class="topbar-search">
            <button id="searchBtn">
              <span id="searchText"></span>
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="bottombar fixed-bottom border-top border-2 d-lg-none">
      <ul class="bottombar-nav">
        <li class="bottom-nav-item active">
          <a href="#" class="bottom-nav-link">
            <i class="bi bi-house-door"></i>
            <span>خانه</span>
          </a>
        </li>
        <li class="bottom-nav-item">
          <a href="" class="bottom-nav-link">
            <i class="bi bi-grid"></i>
            <span>دسته بندی</span>
          </a>
        </li>
        <li class="bottom-nav-item">
          <a href="" class="bottom-nav-link">
            <i class="bi bi-cart3"></i>
            <span>سبد خرید</span>
          </a>
        </li>
        <li class="bottom-nav-item">
          <a href="" class="bottom-nav-link">
            <i class="bi bi-newspaper"></i>
            <span>بلاگ</span>
          </a>
        </li>
        <li class="bottom-nav-item">
          <a href="" class="bottom-nav-link">
            <i class="bi bi-person-circle"></i>
            <span>ورود</span>
          </a>
        </li>
      </ul>
      <div
        class="bottombar-support d-flex justify-content-center align-items-center"
      >
        <a href="tel:02191001214" class="d-flex align-items-center">
          <img src="assets/images/support.png" width="30" height="30" alt="" />
          <p class="m-0" style="font-size: 14px">پشتیبانی</p>
        </a>
      </div>
    </div>

    <div class="search-overlay d-lg-none" id="searchOverlay">
      <div class="search-overlay__content">
        <div class="search-overlay__inputWrapper">
          <form
            method="GET"
            action="https://www.taminfalat.com/search"
            role="form"
            data-parsley-validate=""
            novalidate=""
          >
            <input
              type="text"
              name="main_search"
              id="overlaySearchInput"
              autocomplete="off"
              placeholder="جستجو..."
              class="search-overlay__input"
              value=""
              data-parsley-id="4"
            />
          </form>

          <i class="bi bi-search"></i>
        </div>
        <button class="search-overlay__close" id="closeSearch">
          <i class="bi bi-x"></i>
        </button>
      </div>
      <div class="search-overlay__popular">
        <div>
          <p class="m-0 py-3">جستجوهای محبوب</p>
        </div>
        <div class="search-overlay__links">
          <a class="search-overlay__link" href="#">دستمال کاغذی</a>
          <a class="search-overlay__link" href="#">زونکن</a>
          <a class="search-overlay__link" href="#">کاغذ A4</a>
          <a class="search-overlay__link" href="#">قند</a>
          <a class="search-overlay__link" href="#">کپی مکس</a>
          <a class="search-overlay__link" href="#">مایع دستشویی</a>
          <a class="search-overlay__link" href="#">چای</a>
          <a class="search-overlay__link" href="#">خودکار</a>
          <a class="search-overlay__link" href="#">کیسه زباله</a>
          <a class="search-overlay__link" href="#">شکلات</a>
        </div>
      </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
